<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dashboard | Life Drop</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-header">
            <i data-lucide="droplet"></i> Life Drop
        </div>
        <div class="sidebar-nav">
            <div class="sidebar-item active" data-target="section-requests">
                <i data-lucide="file-plus"></i> Blood Requests
            </div>
            <a href="search.html" class="sidebar-item" style="text-decoration:none">
                <i data-lucide="search"></i> Search Inventory
            </a>
            <div class="sidebar-item text-danger" onclick="logout()" style="margin-top:auto; color:var(--danger)">
                <i data-lucide="log-out"></i> Logout
            </div>
        </div>
    </aside>

    <main class="dashboard-wrapper">
        <nav class="dashboard-nav">
            <div class="dash-nav-left">
                <h2 style="font-size:1.25rem; margin:0">Hospital Portal</h2>
            </div>
            <div class="dash-nav-right">
                <div class="avatar-row">
                    <div class="avatar-circle user-avatar-display" style="background:var(--primary-glow); color:var(--primary); border:none;">H</div>
                    <span class="text-primary" style="font-weight:600" class="user-name-display">Hospital</span>
                </div>
            </div>
        </nav>

        <section id="section-requests" class="dashboard-content active">
            <div class="flex justify-between items-center" style="margin-bottom: 24px;">
                <h2>Manage Blood Requests</h2>
                <button class="btn btn-primary" onclick="document.getElementById('requestModal').style.display='flex'">
                    <i data-lucide="plus"></i> New Request
                </button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Patient Name</th>
                            <th>Blood Type</th>
                            <th>Units</th>
                            <th>Urgency</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="reqTableBody">
                        <tr><td colspan="6" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- NEW REQUEST MODAL -->
    <div id="requestModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(4px); z-index:9999; align-items:center; justify-content:center;">
        <div class="card" style="width:100%; max-width:500px; padding:32px; background:var(--bg-card); position:relative;">
            <button onclick="document.getElementById('requestModal').style.display='none'" style="position:absolute; top:24px; right:24px; background:none; border:none; color:var(--text-muted); cursor:pointer;"><i data-lucide="x"></i></button>
            <h3 style="margin-bottom:24px">Submit Blood Request</h3>
            
            <form id="newReqForm" onsubmit="submitRequest(event)">
                <div class="grid-2" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div class="form-group">
                        <select id="reqBloodType" class="form-input" required>
                            <option value="" disabled selected></option>
                            <option value="A+">A+</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B-">B-</option>
                            <option value="AB+">AB+</option><option value="AB-">AB-</option>
                            <option value="O+">O+</option><option value="O-">O-</option>
                        </select>
                        <label class="form-label">Blood Type *</label>
                    </div>
                    <div class="form-group">
                        <input type="number" id="reqUnits" class="form-input" placeholder=" " min="1" max="20" required>
                        <label class="form-label">Units Needed *</label>
                    </div>
                </div>

                <div class="form-group">
                    <select id="reqUrgency" class="form-input" required>
                        <option value="Normal">Normal</option>
                        <option value="Urgent">Urgent (Within 24h)</option>
                        <option value="Critical">Critical (Immediate)</option>
                    </select>
                    <label class="form-label">Urgency Level</label>
                </div>

                <div class="form-group">
                    <input type="text" id="reqPatient" class="form-input" placeholder=" ">
                    <label class="form-label">Patient Name (Optional)</label>
                </div>

                <div class="form-group">
                    <input type="text" id="reqNotes" class="form-input" placeholder=" ">
                    <label class="form-label">Additional Notes</label>
                </div>

                <button type="submit" class="btn btn-primary" id="submitReqBtn" style="width:100%">Submit Request</button>
            </form>

            <!-- Success State inside modal -->
            <div id="reqSuccessState" style="display:none; text-align:center; padding:24px 0;">
                <i data-lucide="check-circle" style="color:var(--success); width:64px; height:64px; margin-bottom:16px;"></i>
                <h3 style="color:var(--text-primary); margin-bottom:8px;">Request Broadcasted</h3>
                <p class="text-muted" id="reqMatchResult" style="margin-bottom:24px;"></p>
                <button class="btn btn-outline" onclick="closeModalAndRefresh()" style="width:100%">Close</button>
            </div>
        </div>
    </div>


    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/animations.js"></script>
    <script src="js/dashboard.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(!requireAuth('hospital')) return;
            bindSidebar();
            loadRequests();
        });

        async function loadRequests() {
            try {
                const {data} = await apiFetch(`/api/requests/${localStorage.getItem('roleId')}`);
                const tbody = document.getElementById('reqTableBody');
                
                if(!data.success || !data.requests.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No requests found.</td></tr>';
                    return;
                }
                
                let h = '';
                data.requests.forEach(r => {
                    const date = new Date(r.created_at).toLocaleDateString();
                    h += `
                        <tr>
                            <td class="text-muted">${date}</td>
                            <td><strong>${r.patient_name || 'N/A'}</strong></td>
                            <td><span class="badge badge-primary">${r.blood_type}</span></td>
                            <td>${r.units_needed}</td>
                            <td>${getUrgencyBadge(r.urgency)}</td>
                            <td>${getStatusBadge(r.status)}</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = h;
            } catch(e) { }
        }

        async function submitRequest(e) {
            e.preventDefault();
            const payload = {
                blood_type: document.getElementById('reqBloodType').value,
                units_needed: document.getElementById('reqUnits').value,
                urgency: document.getElementById('reqUrgency').value,
                patient_name: document.getElementById('reqPatient').value,
                notes: document.getElementById('reqNotes').value
            };

            const btn = document.getElementById('submitReqBtn');
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;

            try {
                const {data} = await apiFetch('/api/requests/new', {
                    method: 'POST', body: JSON.stringify(payload)
                });
                
                if(data.success) {
                    document.getElementById('newReqForm').style.display = 'none';
                    document.getElementById('reqSuccessState').style.display = 'block';
                    
                    const mr = document.getElementById('reqMatchResult');
                    if(data.matchedCount > 0) {
                        mr.innerHTML = `<strong>Great news!</strong> We found ${data.matchedCount} compatible donors in your city. They have been notified immediately via SMS/Email alerts.`;
                        mr.style.color = 'var(--primary-hover)';
                    } else {
                        mr.innerHTML = `Request logged. We are searching our network for compatible donors. We'll notify you when a match is found.`;
                    }
                } else {
                    showToast(data.message, 'error');
                    btn.innerHTML = 'Submit Request';
                    btn.disabled = false;
                }
            } catch(e) { 
                showToast('API Error', 'error');
                btn.innerHTML = 'Submit Request';
                btn.disabled = false;
            }
        }

        function closeModalAndRefresh() {
            document.getElementById('requestModal').style.display = 'none';
            document.getElementById('newReqForm').style.display = 'block';
            document.getElementById('newReqForm').reset();
            document.getElementById('reqSuccessState').style.display = 'none';
            document.getElementById('submitReqBtn').disabled = false;
            document.getElementById('submitReqBtn').innerHTML = 'Submit Request';
            loadRequests();
        }
    </script>
</body>
</html>
